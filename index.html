<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Princess Runner FIXED</title>
<style>
body { margin:0; overflow:hidden; }
#menu {
  position:absolute;
  width:100%; height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#87CEEB;
}
button {
  padding:15px 30px;
  font-size:18px;
}
#score {
  position:absolute;
  top:10px; left:10px;
  color:white;
}
</style>
</head>

<body>

<div id="menu">
  <h1>Princess Runner</h1>
  <button onclick="startGame()">Play</button>
</div>

<div id="score">Score: 0</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.152/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.152/examples/jsm/loaders/GLTFLoader.js";

let scene, camera, renderer, player;
let obstacles=[];
let lane=0, speed=0.4, score=0;
let gameRunning=false;

function startGame(){
  document.getElementById("menu").style.display="none";
  init();
  animate();
}

function init(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);

  camera = new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,1000);
  camera.position.set(0,5,10);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  let light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(5,10,7);
  scene.add(light);

  scene.add(new THREE.AmbientLight(0xffffff,0.6));

  // ROAD
  let road = new THREE.Mesh(
    new THREE.BoxGeometry(10,0.1,200),
    new THREE.MeshStandardMaterial({color:0x444444})
  );
  road.position.z=-100;
  scene.add(road);

  // 🔥 LOAD MODEL (WITH ERROR CHECK)
  const loader = new GLTFLoader();

  loader.load(
    "./Astronaut.glb",
    (gltf)=>{
      player = gltf.scene;
      player.scale.set(2,2,2);
      scene.add(player);
    },
    undefined,
    (error)=>{
      console.log("MODEL ERROR:", error);

      // fallback player (IMPORTANT)
      let geo = new THREE.BoxGeometry(1,2,1);
      let mat = new THREE.MeshStandardMaterial({color:0xff69b4});
      player = new THREE.Mesh(geo,mat);
      player.position.y=1;
      scene.add(player);
    }
  );

  document.addEventListener("keydown",(e)=>{
    if(e.key==="ArrowLeft") lane=Math.max(-1,lane-1);
    if(e.key==="ArrowRight") lane=Math.min(1,lane+1);
  });

  gameRunning=true;
}

function spawnObstacle(){
  let obs = new THREE.Mesh(
    new THREE.BoxGeometry(2,2,2),
    new THREE.MeshStandardMaterial({color:0xff0000})
  );
  obs.position.set([-3,0,3][Math.floor(Math.random()*3)],1,-50);
  scene.add(obs);
  obstacles.push(obs);
}

function animate(){
  if(!gameRunning) return;
  requestAnimationFrame(animate);

  if(player){
    player.position.x += (lane*3 - player.position.x)*0.2;
    camera.position.x = player.position.x;
    camera.lookAt(player.position);
  }

  obstacles.forEach((o,i)=>{
    o.position.z += speed;
    if(player && o.position.distanceTo(player.position)<1.5){
      alert("Game Over!");
      location.reload();
    }
  });

  if(Math.random()<0.03) spawnObstacle();

  score++;
  document.getElementById("score").innerText="Score: "+score;

  renderer.render(scene,camera);
}

window.startGame = startGame;

</script>

</body>
</html>
