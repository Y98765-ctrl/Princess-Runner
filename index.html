<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Princess Runner</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; }

#menu {
  position:absolute;
  width:100%; height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:linear-gradient(#87CEEB, white);
  z-index:10;
}

button {
  padding:15px 30px;
  font-size:20px;
  background:linear-gradient(pink, hotpink);
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}
button:hover { transform:scale(1.1); }

#score {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-size:20px;
}
</style>
</head>

<body>

<div id="menu">
  <h1>👑 Princess Runner</h1>
  <button id="playBtn">Play</button>
</div>

<div id="score">Score: 0</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.152/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.152/examples/jsm/loaders/GLTFLoader.js";

let scene, camera, renderer;
let player;
let obstacles = [];
let coins = [];

let lane = 0;
let speed = 0.4;
let score = 0;
let gameRunning = false;

let velY = 0;

// ✅ BUTTON FIXED
document.getElementById("playBtn").addEventListener("click", startGame);

function startGame(){
  document.getElementById("menu").style.display = "none";
  init();
  animate();
}

function init(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = new THREE.Fog(0x87CEEB,10,80);

  camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,5,10);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  // LIGHT
  scene.add(new THREE.AmbientLight(0xffffff,0.7));

  let light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(5,10,7);
  scene.add(light);

  // ROAD
  let road = new THREE.Mesh(
    new THREE.BoxGeometry(10,0.1,200),
    new THREE.MeshStandardMaterial({color:0x444444})
  );
  road.position.z = -100;
  scene.add(road);

  // TREES
  for(let i=0;i<20;i++){
    let tree = new THREE.Mesh(
      new THREE.CylinderGeometry(0.2,0.5,3),
      new THREE.MeshStandardMaterial({color:0x228B22})
    );
    tree.position.set((i%2===0?-6:6),1.5,-i*10);
    scene.add(tree);
  }

  // 👸 LOAD MODEL (SAFE)
  const loader = new GLTFLoader();
  loader.load(
    "./Astronaut.glb",
    (gltf)=>{
      player = gltf.scene;
      player.scale.set(2,2,2);
      scene.add(player);
    },
    undefined,
    ()=>{
      // fallback player (NO WHITE SCREEN)
      let geo = new THREE.BoxGeometry(1,2,1);
      let mat = new THREE.MeshStandardMaterial({color:0xff69b4});
      player = new THREE.Mesh(geo,mat);
      player.position.y = 1;
      scene.add(player);
    }
  );

  // CONTROLS
  document.addEventListener("keydown",(e)=>{
    if(e.key==="ArrowLeft") lane=Math.max(-1,lane-1);
    if(e.key==="ArrowRight") lane=Math.min(1,lane+1);
    if(e.key===" " || e.key==="ArrowUp") jump();
  });

  gameRunning = true;
}

function jump(){
  if(player && player.position.y <= 0.01){
    velY = 0.2;
  }
}

function spawnObstacle(){
  let obs = new THREE.Mesh(
    new THREE.BoxGeometry(2,2,2),
    new THREE.MeshStandardMaterial({color:0xff0000})
  );
  obs.position.set([-3,0,3][Math.floor(Math.random()*3)],1,-50);
  scene.add(obs);
  obstacles.push(obs);
}

function spawnCoin(){
  let coin = new THREE.Mesh(
    new THREE.TorusGeometry(0.5,0.2,8,16),
    new THREE.MeshStandardMaterial({color:0xffd700})
  );
  coin.position.set([-3,0,3][Math.floor(Math.random()*3)],1.5,-50);
  scene.add(coin);
  coins.push(coin);
}

function animate(){
  if(!gameRunning) return;
  requestAnimationFrame(animate);

  // PLAYER
  if(player){
    player.position.x += (lane*3 - player.position.x)*0.2;

    velY -= 0.01;
    player.position.y += velY;
    if(player.position.y < 0){
      player.position.y = 0;
      velY = 0;
    }

    camera.position.x = player.position.x;
    camera.lookAt(player.position);
  }

  // OBSTACLES
  obstacles.forEach((o,i)=>{
    o.position.z += speed;

    if(player && o.position.distanceTo(player.position)<1.5){
      gameOver();
    }

    if(o.position.z>10){
      scene.remove(o);
      obstacles.splice(i,1);
    }
  });

  // COINS
  coins.forEach((c,i)=>{
    c.rotation.y += 0.1;
    c.position.z += speed;

    if(player && c.position.distanceTo(player.position)<1.5){
      scene.remove(c);
      coins.splice(i,1);
      score += 20;
    }

    if(c.position.z>10){
      scene.remove(c);
      coins.splice(i,1);
    }
  });

  if(Math.random()<0.03) spawnObstacle();
  if(Math.random()<0.04) spawnCoin();

  speed += 0.0005;
  score++;

  document.getElementById("score").innerText = "Score: " + score;

  renderer.render(scene,camera);
}

function gameOver(){
  gameRunning = false;
  alert("Game Over! Score: " + score);
  location.reload();
}

</script>

</body>
</html>
